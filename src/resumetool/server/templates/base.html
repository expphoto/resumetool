<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Hiring Triage{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8f9fa; color: #212529; }
    a { color: #0d6efd; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .nav { background: #1a1a2e; color: #eee; padding: 0 2rem; display: flex; align-items: center; gap: 2rem; height: 52px; }
    .nav-brand { font-weight: 700; font-size: 1.1rem; color: #fff; letter-spacing: 0.03em; }
    .nav a { color: #ccc; font-size: 0.9rem; }
    .nav a:hover { color: #fff; text-decoration: none; }

    .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }

    .card { background: #fff; border: 1px solid #dee2e6; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-header { font-weight: 600; font-size: 1rem; margin-bottom: 1rem; color: #495057; border-bottom: 1px solid #dee2e6; padding-bottom: 0.75rem; }

    .badge { display: inline-block; padding: 0.2em 0.6em; border-radius: 4px; font-size: 0.8rem; font-weight: 600; }
    .badge-A { background: #d1fae5; color: #065f46; }
    .badge-B { background: #dbeafe; color: #1e40af; }
    .badge-C { background: #fef3c7; color: #92400e; }
    .badge-D { background: #fee2e2; color: #991b1b; }
    .badge-completed { background: #d1fae5; color: #065f46; }
    .badge-sent { background: #dbeafe; color: #1e40af; }
    .badge-pending { background: #f3f4f6; color: #4b5563; }
    .badge-expired { background: #fee2e2; color: #991b1b; }

    .score-bar-wrap { background: #e9ecef; border-radius: 4px; height: 8px; width: 100%; }
    .score-bar { height: 8px; border-radius: 4px; background: #0d6efd; }
    .score-bar.high { background: #198754; }
    .score-bar.mid { background: #fd7e14; }
    .score-bar.low { background: #dc3545; }

    .btn { display: inline-block; padding: 0.45rem 1rem; border-radius: 6px; font-size: 0.9rem; border: none; cursor: pointer; font-weight: 500; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #0b5ed7; color: #fff; }
    .btn-success { background: #198754; color: #fff; }
    .btn-danger { background: #dc3545; color: #fff; }
    .btn-secondary { background: #6c757d; color: #fff; }

    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { text-align: left; padding: 0.6rem 0.75rem; background: #f8f9fa; border-bottom: 2px solid #dee2e6; font-weight: 600; color: #495057; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; }
    td { padding: 0.65rem 0.75rem; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    tr:hover td { background: #f8f9fa; }

    .tag { display: inline-block; background: #e9ecef; border-radius: 3px; padding: 0.15em 0.5em; font-size: 0.78rem; margin: 0.1em; color: #495057; }
    .tag.good { background: #d1fae5; color: #065f46; }
    .tag.gap { background: #fee2e2; color: #991b1b; }

    select, input[type=text], textarea { padding: 0.4rem 0.6rem; border: 1px solid #ced4da; border-radius: 6px; font-size: 0.9rem; width: 100%; }
    label { display: block; font-size: 0.85rem; font-weight: 500; color: #495057; margin-bottom: 0.3rem; }
    .form-group { margin-bottom: 1rem; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav class="nav">
    <span class="nav-brand">Triage</span>
    <a href="/">Dashboard</a>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
