name: Deploy marketing site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "src/resumetool/server/templates/**"
      - "src/resumetool/server/static/**"
      - "scripts/build_static.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Jinja2
        run: python -m pip install --upgrade pip && python -m pip install jinja2

      - name: Build static site
        run: python scripts/build_static.py --out public --base /resumetool/

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
          keep_files: false
          commit_message: "Deploy marketing site (build ${{ github.run_number }})"
